name: Frontend CI

on:
  pull_request:
    branches: [ develop, release, main ]
  push:
    branches: [ develop, release, main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
